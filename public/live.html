<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>HTML · Hermes</title>
    <script>
      try {
        if (/(?:^|[?&])theme=dark(?:&|$)/.test(location.search) || localStorage.getItem("diaryDark") === "1") {
          document.documentElement.className = "dark";
        }
      } catch (error) {}
    </script>
    <link rel="stylesheet" href="/live.css?v=11">
    <link rel="stylesheet" href="/live-journey.css?v=2">
  </head>
  <body class="livePage viewMode toolsCollapsed">
    <main class="liveShell">
      <header class="liveBar">
        <div class="liveIdentity"><strong>Hermes</strong><span id="liveState" aria-live="polite">Opening…</span></div>
        <div class="liveActions">
          <button id="liveHistoryBtn" type="button">History</button>
          <button id="liveNewBtn" type="button">New</button>
          <button id="liveSendBtn" type="button" disabled>Send</button>
        <div id="annotationDock" class="annotationDock">
          <button id="annotationToggleBtn" class="annotationToggle" type="button" aria-expanded="false" aria-controls="annotationTools" aria-label="Open annotation tools" title="Annotate">
            <span aria-hidden="true">&#9998;</span>
          </button>
          <div id="annotationTools" class="annotationTools" role="toolbar" aria-label="HTML drawing tools" hidden>
            <div class="toolActions" aria-label="Drawing actions">
              <button id="drawModeBtn" type="button" aria-pressed="false" aria-label="Toggle drawing" title="Draw">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m4 20 4.5-1 10-10a2.1 2.1 0 0 0 0-3l-.5-.5a2.1 2.1 0 0 0-3 0l-10 10L4 20Z"/><path d="m13 7 4 4"/></svg>
              </button>
              <button id="sendInkBtn" type="button" aria-label="Send annotation" title="Send" disabled>
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4 20-7Z"/></svg>
              </button>
              <button id="undoInkBtn" type="button" aria-label="Undo" title="Undo" disabled>
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 7 4 12l5 5"/><path d="M5 12h8a6 6 0 0 1 6 6"/></svg>
              </button>
              <button id="eraserInkBtn" type="button" aria-label="Toggle eraser" title="Eraser">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7 21-4-4L14.5 5.5a2.1 2.1 0 0 1 3 0l1 1a2.1 2.1 0 0 1 0 3L7 21Z"/><path d="m11 9 4 4M7 21h12"/></svg>
              </button>
              <button id="copyInkBtn" type="button" aria-label="Copy ink" title="Copy ink" disabled>
                <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="8" y="8" width="11" height="12" rx="1"/><path d="M16 8V4H5a1 1 0 0 0-1 1v11h4"/></svg>
              </button>
              <button id="pasteInkBtn" type="button" aria-label="Paste ink" title="Paste ink" disabled>
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5h6M9 3h6v4H9z"/><path d="M7 5H5v16h14V5h-2"/></svg>
              </button>
              <button id="clearInkBtn" type="button" aria-label="Clear page" title="Clear page" disabled>
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M9 3h6l1 4H8l1-4Z"/><path d="m7 7 1 14h8l1-14M10 11v6M14 11v6"/></svg>
              </button>
              <button id="backBtn" type="button" aria-label="History" title="History">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h11a2 2 0 0 1 2 2v16H8a3 3 0 0 1-3-3V4a1 1 0 0 1 1-1Z"/><path d="M8 21V5M11 8h5M11 12h5"/></svg>
              </button>
            </div>
            <div class="intentActions" aria-label="Quick intents">
              <button class="intentBtn" type="button" data-intent="summarize" title="Summarize">Sum</button>
              <button class="intentBtn" type="button" data-intent="tasks" title="Tasks">Tasks</button>
              <button class="intentBtn" type="button" data-intent="email" title="Email draft">Email</button>
              <button class="intentBtn" type="button" data-intent="workpaper" title="Workpaper note">W/P</button>
            </div>
          </div>
        </div></div>
      </header>


      <section id="livingSurface" class="livingSurface">
        <iframe id="liveFrame" title="Hermes HTML" sandbox="allow-same-origin" referrerpolicy="no-referrer"></iframe>
        <svg id="liveInkDisplay" aria-hidden="true" focusable="false"></svg>
        <canvas id="liveInk" aria-label="Annotate Hermes HTML"></canvas>
        <div id="liveMessage" class="liveMessage">Opening the page…</div>
      </section>
      <section id="liveReply" class="liveReply" hidden aria-live="polite">
        <button id="closeReplyBtn" type="button">Close</button>
        <strong>Hermes</strong>
        <div id="liveReplyText"></div>
      </section>
      <section id="liveHistory" class="liveHistory" hidden aria-label="Hermes history">
        <header><strong>History</strong><button id="liveHistoryCloseBtn" type="button">Close</button></header>
        <div id="liveHistoryList"><p>Loading…</p></div>
      </section>
    </main>
    <script src="/live.js?v=17"></script>
    <script src="/live-journey.js?v=3"></script>
  </body>
</html>
