name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm test
      - run: python -m pip install pytest aiohttp
      - run: python -m pytest test/kindle-plugin -q
      - name: Syntax checks
        run: |
          node --check server.mjs
          node --check public/app.js
          python -m compileall -q kindle-plugin
